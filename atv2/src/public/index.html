<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Lista de Compras</h1>
      <button type="button" class="btn-create" id="btnCreate">+ Adicionar Item</button>
    </header>

    <div class="toolbar">
      <div class="tabs">
        <button type="button" class="tab active" data-status="all">Todos</button>
        <button type="button" class="tab" data-status="pendente">Pendente</button>
        <button type="button" class="tab" data-status="comprado">Comprado</button>
      </div>
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="Buscar itens...">
      </div>
    </div>

    <main class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll"></th>
            <th>#</th>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preço (R$)</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- itens carregados via JS -->
        </tbody>
      </table>
    </main>
  </div>

  <!-- Modal para criar/editar -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Adicionar Item</h2>
      <form id="itemForm">
        <input type="hidden" id="itemId">
        <div class="form-group">
          <label for="nome">Nome do produto *</label>
          <input type="text" id="nome" required placeholder="Ex: Leite">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" min="1" value="1" placeholder="1">
          </div>
          <div class="form-group">
            <label for="preco">Preço (R$)</label>
            <input type="number" id="preco" min="0" step="0.01" value="0" placeholder="0,00">
          </div>
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="pendente">Pendente</option>
            <option value="comprado">Comprado</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
