<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carros</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <p class="back"><a href="index.html">← Voltar</a></p>
    <h1>Cadastrar carros</h1>
    <div class="form-card">
      <form id="formCarro">
        <label>Modelo <input type="text" name="modelo" required placeholder="Ex: Gol"></label>
        <label>Marca <input type="text" name="marca" required placeholder="Ex: Volkswagen"></label>
        <label>Ano <input type="number" name="ano" required min="1900" max="2100" placeholder="2020"></label>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </form>
    </div>
    <p id="msg" class="msg" hidden aria-live="polite"></p>
    <h2>Lista de carros</h2>
    <div class="tabela-wrapper">
      <table>
        <thead>
          <tr><th>ID</th><th>Modelo</th><th>Marca</th><th>Ano</th><th>Ações</th></tr>
        </thead>
        <tbody id="listaCarros"></tbody>
      </table>
    </div>
  </div>
  <script src="carros.js"></script>
</body>
</html>
